version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    command: serve

  agent:
    build: .
    container_name: cloudops-buddy
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=dummy
      - OPENAI_BASE_URL=http://ollama:11434/v1
      - OPENAI_MODEL=qwen3:0.6b
    depends_on:
      - ollama
    volumes:
      - ./.env:/app/.env   # optional, mount local .env

volumes:
  ollama_data: